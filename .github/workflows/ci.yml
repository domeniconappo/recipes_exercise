---
name: CI

on:
  push:
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    # PostgreSQL service (healthy before tests start)
    services:
      postgres:
        image: postgres
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test
        options: >-
          --health-cmd "pg_isready -U postgres -d test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: test
          load: true
          tags: fastapi-app:test

      - name: Create reports directory on runner
        run: mkdir -p reports

      - name: Linting
        run: docker run --rm fastapi-app:test /application/.venv/bin/ruff check . --select I --fix
      - name: Run tests
        run: |
          docker run --rm \
            --network host \
            -e POSTGRES_DB=test -e DATABASE_URL="postgresql+asyncpg://postgres:postgres@localhost:5432/test" \
            -v ${{ github.workspace }}/reports:/tmp \
            fastapi-app:test

      # Upload everything so you can download reports from the Actions UI
      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: reports
          retention-days: 7
